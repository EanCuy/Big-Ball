<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Price Comparison</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1 class="title">🎮 Game Price Comparison</h1>

    <input type="text" class="search" placeholder="Search game...">

    <p class="empty">No games available. Data will be added later.</p>

    <!-- TABLE STYLE LIKE CHEAPSHARK -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Savings</th>
            <th>Game</th>
            <th>Steam</th>
            <th>Epic Games</th>
            <th>GOG</th>
          </tr>
        </thead>
        <tbody>
          <!-- TEMPLATE ROW -->
          <tr>
            <td>0%</td>
            <td class="game-cell">
              <img src="placeholder.jpg" class="table-img" alt="game">
              <span>Game Title</span>
            </td>
            <td>$0</td>
            <td>$0</td>
            <td>$0</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</body>
</html>
